name: CI

# Build-gate for every push to main and every pull request targeting main.
# Frontend job: TypeScript compile + production bundle.
# Backend job: install deps + run pytest against synthetic fixtures.
# E2E job: Playwright smoke against the built frontend with a stub backend.
# All three jobs run in parallel with dependency caching. Target: <5 min total.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build (tsc -b && vite build)
        run: npm run build

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Check env var pinning (render.yaml)
        # Fails CI if backend/app/ reads an os.environ.get("*_URL") whose
        # key is not pinned in render.yaml. Catches the recurring failure
        # where an env var is activated only in the Render dashboard and
        # gets silently dropped on a Blueprint re-provision. See
        # scripts/check_env_var_pinning.py for the full rule.
        run: python scripts/check_env_var_pinning.py

      - name: Run tests
        # `python -m pytest` (not plain `pytest`) prepends cwd to sys.path so
        # `from backend.app import ...` imports resolve. Using `pytest` alone
        # gives ModuleNotFoundError: No module named 'backend' in CI.
        run: python -m pytest backend/tests/ -v

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    # Smoke-only suite: 6 tests covering the public routes (Progression,
    # QT Squeeze, Lifter Lookup search/detail/compare/manual). Backend is
    # NOT spun up — tests assert tab structure + URL state, not data.
    # `continue-on-error: true` is intentional: the smoke suite is brand new
    # to CI (Arc 7, 2026-04-26) and the watchConsoleErrors helper may flag
    # benign React Query fetch failures from the missing backend. We want
    # the report uploaded so we can iterate, without blocking deploys until
    # the suite is hardened or a stub backend is wired in.
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        run: npx playwright test
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
