# Fly.io app config for the cpu-analytics backend.
#
# Region "yul" is Montreal, closest to most Canadian users.
# Free-tier-friendly: auto_stop + min_machines_running = 0 means the machine
# sleeps when idle and wakes on the first request (~3-5 second cold start
# plus parquet download on first request after wake).
#
# If the app name `cpu-analytics-backend` is taken globally, Fly will prompt
# you to pick a different name at `fly launch` time. That's fine.

app = "cpu-analytics-backend"
primary_region = "yul"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  OPENIPF_PARQUET_URL = "https://github.com/m6bernha/cpu-analytics/releases/download/data-latest/openipf.parquet"
  QT_PARQUET_URL = "https://github.com/m6bernha/cpu-analytics/releases/download/data-latest/qt_standards.parquet"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
